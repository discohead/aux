# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Aux — Apple Music App + CLI API Specification                             ║
# ║  Canonical mapping: MusicKit + REST API + AppleScript → CLI commands       ║
# ║  Version: 1.1.0-draft                                                     ║
# ║  Generated: 2026-03-15                                                     ║
# ║  Platform: macOS 14.2+ (Sonoma) — required for full MusicLibraryRequest    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# VERIFICATION NOTES:
#   - All MusicKit request types verified against Apple Developer Documentation
#     and WWDC21/WWDC22 session transcripts.
#   - macOS availability verified via Apple Developer Forums (threads #711950,
#     #710322, #736717, #707436, #698902, #696453).
#   - MusicLibraryRequest confirmed unavailable on macOS 13 (Ventura);
#     available macOS 14+ (Sonoma); stable on macOS 14.2+.
#   - ApplicationMusicPlayer and SystemMusicPlayer confirmed @available(macOS,
#     unavailable) per Apple engineer JoeKun (forum thread #698902).
#   - MusicLibrary.shared.add() and .createPlaylist() confirmed
#     @available(macOS, unavailable); use REST API via MusicDataRequest.
#   - MusicRecentlyPlayedContainerRequest confirmed real via Apple engineer
#     response (forum thread #696453, iOS 16+/macOS 13+).
#   - Music.app AppleScript dictionary audited via Doug's AppleScripts reference,
#     Apple Developer Forums (threads #669239, #694200), mcp-applemusic skill,
#     and the Music.app .sdef scripting dictionary documentation.
#   - AppleScript writable track properties verified: name, artist, album artist,
#     album, genre, year, composer, comments, lyrics, BPM, track/disc number,
#     compilation, grouping, sort fields, volume adjustment, EQ, start, finish,
#     enabled, rating, loved, disliked.
#   - AppleScript artwork read/write confirmed (data of artwork N of track).
#   - AppleScript `add` (file import), `convert`, `delete`, `reveal`, `search`
#     commands confirmed. `duplicate current track to source "Library"` for
#     adding streaming tracks is unreliable per Apple engineer JoeKun
#     (forum thread #694200).

meta:
  app_name: Aux
  cli_command: aux
  version: "1.1.0"
  description: >
    macOS application and CLI that bridges Apple Music — MusicKit framework,
    REST API, and Music.app AppleScript — to structured JSON over stdio.
    Aux.app handles authorization and preferences with a native GUI;
    the aux command provides 88 structured commands for agent consumption.
  license: MIT
  platforms:
    minimum: "macOS 14.2"
    recommended: "macOS 15.0"
    rationale: >
      macOS 14.2 is the minimum for stable MusicLibraryRequest.
      macOS 15 (Sequoia) adds improved TCC handling for bundled apps.
  swift_version: "5.10+"
  dependencies:
    - name: swift-argument-parser
      url: "https://github.com/apple/swift-argument-parser.git"
      version: ">=1.3.0"
    - name: MusicKit
      type: system_framework
      note: "No SPM dependency required; import MusicKit resolves from macOS SDK"
  app_architecture:
    model: "VS Code pattern — native app with installable CLI command"
    app_responsibilities:
      - "First-run MusicKit authorization (GUI consent dialog)"
      - "Install aux Command in PATH menu item (symlinks binary)"
      - "Preferences UI (default output format, storefront, token display)"
      - "Optional menu bar presence (now-playing, quick controls)"
    cli_responsibilities:
      - "All 88 commands with structured JSON output"
      - "Dual-mode binary: detects headless launch, skips GUI init"
      - "Agent consumption via bash tool invocation"
    install_flow:
      - "User downloads Aux.app, drags to /Applications"
      - "First launch triggers MusicAuthorization.request() in GUI context"
      - "Aux menu → Install aux Command in PATH"
      - "Creates symlink: /usr/local/bin/aux → /Applications/Aux.app/Contents/MacOS/aux"
  bundle:
    structure: |
      Aux.app/
        Contents/
          Info.plist
          MacOS/
            aux                   ← Dual-mode Swift binary
          Resources/
            Assets.xcassets       ← App icon
          PkgInfo
          _CodeSignature/
            CodeResources
          embedded.provisionprofile
    entitlements:
      - com.apple.developer.musickit
    info_plist:
      CFBundleName: Aux
      CFBundleIdentifier: com.yourorg.aux
      NSAppleMusicUsageDescription: >
        Aux requires access to Apple Music for catalog search,
        library management, and playback control.

# ─── Authentication & Authorization ────────────────────────────────────────────

authentication:
  developer_token:
    managed_by: MusicKit_framework
    automatic: true
    note: >
      MusicKit on Apple platforms generates and manages developer tokens
      automatically when the App ID has MusicKit capability enabled.
      No manual JWT generation is needed for framework-based access.
    manual_generation:
      when_needed: "Only if using REST API directly without MusicKit framework"
      requirements:
        - Apple Developer Program membership ($99/year)
        - MusicKit private key (.p8 file) from Certificates, Identifiers & Profiles
        - 10-character Key ID
        - 10-character Team ID
      jwt_spec:
        algorithm: ES256
        max_expiration: "180 days"
        header_fields: [alg, kid]
        payload_fields: [iss, iat, exp]

  user_token:
    managed_by: MusicKit_framework
    automatic: true
    obtained_via: "MusicAuthorization.request()"
    note: >
      Triggers a system-level consent dialog on macOS. Authorization persists
      in TCC database across launches for bundled apps.

  token_provider:
    api: "MusicTokenProvider.shared"
    availability: "macOS 13.0+"
    exposes:
      - developerToken
      - userToken

  entitlements:
    required:
      - com.apple.developer.musickit
    info_plist_keys:
      - key: NSAppleMusicUsageDescription
        type: String
        required: true
        example: "Aux requires access to Apple Music for catalog and library operations."
      - key: CFBundleIdentifier
        type: String
        required: true
        example: "com.yourorg.aux"

  app_id_setup:
    steps:
      - "Register App ID at developer.apple.com/account"
      - "Enable MusicKit under App Services"
      - "Create provisioning profile for macOS"
      - "Embed profile as embedded.provisionprofile in .app bundle"

# ─── Implementation Layers ─────────────────────────────────────────────────────

implementation_layers:
  musickit_framework:
    id: framework
    description: "Native MusicKit Swift framework — type-safe, automatic tokens, Codable"
    covers:
      - Catalog search, browse, charts, suggestions
      - Library reads (songs, albums, playlists, artists)
      - Authorization and subscription checks
      - Personal recommendations, recently played
      - Storefront information

  rest_api:
    id: rest
    description: >
      Apple Music REST API via MusicDataRequest — automatic token attachment,
      returns raw Data for custom decoding.
    covers:
      - Library writes (create playlist, add to library, add tracks to playlist)
      - Ratings (set/get)
      - Any endpoint not covered by structured requests
    base_url: "https://api.music.apple.com/v1"

  applescript_bridge:
    id: applescript
    description: >
      AppleScript commands to Music.app via NSAppleScript/osascript.
      The Music.app scripting dictionary (inherited from 20+ years of iTunes)
      exposes substantial functionality beyond what MusicKit provides on macOS.
      Required for playback because ApplicationMusicPlayer and SystemMusicPlayer
      are @available(macOS, unavailable) for native macOS apps. Also the ONLY
      interface for metadata writing, artwork manipulation, local file import,
      track deletion, AirPlay control, EQ management, and play statistics access.
    covers:
      - Playback control (play, pause, stop, skip, seek, volume, fast forward, rewind)
      - Now playing status and queue info
      - Metadata writing (set name, artist, album, genre, year, composer, etc.)
      - Lyrics read/write
      - Artwork read/write (raw binary data, multiple artworks per track)
      - Local file import (add command) and audio conversion (convert command)
      - Track deletion from library
      - File path access (location property) and Finder reveal
      - File-level metadata (bit rate, sample rate, file size, kind, codec)
      - Play statistics (played count, played date, skipped count, skipped date)
      - Playlist manipulation (create, delete, rename, reorder tracks, remove tracks)
      - AirPlay device listing and selection
      - EQ preset management (list presets, get/set per-track EQ)
      - Library search with compound predicate filtering (whose clause)
      - Shuffle mode/enabled and repeat mode control
      - BPM, start/finish time, volume adjustment, enabled flag per track
    caveats:
      - >
        Streaming tracks (not added to library) may return incomplete properties
        on some macOS versions. Fixed in Big Sur 11.3 but sporadic issues persist.
      - >
        AppleScript is synchronous and single-threaded; bulk operations on large
        libraries should batch in chunks.
      - >
        The AppleScript command for adding streaming tracks to library
        (duplicate current track to source Library) is unreliable,
        confirmed by Apple engineer JoeKun in forum thread #694200.

# ─── Global Options ────────────────────────────────────────────────────────────

global_options:
  - name: "--pretty"
    short: "-p"
    type: Bool
    default: false
    description: "Pretty-print JSON output with indentation"

  - name: "--raw"
    short: null
    type: Bool
    default: false
    description: >
      Output raw MusicKit Codable encoding instead of stable DTOs.
      Useful for debugging but schema may change between OS versions.

  - name: "--quiet"
    short: "-q"
    type: Bool
    default: false
    description: "Suppress stderr diagnostic messages"

  - name: "--version"
    short: "-v"
    type: Bool
    default: false
    description: "Print aux version and exit"

# ─── Exit Codes ────────────────────────────────────────────────────────────────

exit_codes:
  - code: 0
    name: success
    description: "Command completed successfully"
  - code: 1
    name: general_failure
    description: "Unspecified runtime error"
  - code: 2
    name: usage_error
    description: "Invalid arguments, missing required options, or unknown subcommand"
  - code: 3
    name: not_found
    description: "Requested resource not found (empty results for ID-based lookups)"
  - code: 4
    name: not_authorized
    description: "MusicKit authorization denied or not yet requested"
  - code: 5
    name: network_error
    description: "Network request failed (timeout, no connectivity)"
  - code: 6
    name: service_error
    description: "Apple Music API returned an error response"
  - code: 7
    name: subscription_required
    description: "Operation requires active Apple Music subscription"
  - code: 8
    name: unavailable
    description: "Feature unavailable on current macOS version"

# ─── Output Envelope ───────────────────────────────────────────────────────────

output_envelope:
  description: >
    Every successful command emits exactly one JSON object to stdout.
    Errors emit a CLIErrorResponse JSON to stdout AND a human-readable
    message to stderr for human consumers.
  success_schema:
    type: object
    properties:
      data:
        description: "Command-specific result payload (object, array, or scalar)"
      meta:
        type: object
        nullable: true
        properties:
          limit: { type: integer, nullable: true }
          offset: { type: integer, nullable: true }
          total: { type: integer, nullable: true }
          has_next: { type: boolean, nullable: true }
  error_schema:
    type: object
    properties:
      error:
        type: object
        properties:
          code: { type: string, description: "Machine-readable error code" }
          message: { type: string, description: "Human-readable error description" }
          details: { type: object, nullable: true }

# ═══════════════════════════════════════════════════════════════════════════════
# COMMAND GROUPS
# ═══════════════════════════════════════════════════════════════════════════════

commands:

  # ─── AUTH ───────────────────────────────────────────────────────────────────

  auth:
    description: "Manage MusicKit authorization and subscription status"

    subcommands:

      status:
        description: "Check current MusicKit authorization and Apple Music subscription status"
        musickit_api:
          authorization: "MusicAuthorization.currentStatus"
          subscription: "MusicSubscription.current"
        layer: framework
        availability: "macOS 12.0+"
        requires_auth: false
        arguments: []
        options: []
        output_schema:
          type: object
          properties:
            authorization_status:
              type: string
              enum: [authorized, denied, not_determined, restricted]
            subscription:
              type: object
              nullable: true
              properties:
                can_play_catalog_content: { type: boolean }
                can_become_subscriber: { type: boolean }
                has_cloud_library_enabled: { type: boolean }
                # NOTE: MusicSubscription.OfferOptions properties are
                # iOS-only for subscription offer presentation.

      request:
        description: >
          Request MusicKit authorization. Triggers system-level consent dialog.
          Authorization persists in TCC database for bundled apps.
        musickit_api: "MusicAuthorization.request()"
        layer: framework
        availability: "macOS 12.0+"
        requires_auth: false
        arguments: []
        options: []
        output_schema:
          type: object
          properties:
            authorization_status:
              type: string
              enum: [authorized, denied, not_determined, restricted]

      token:
        description: "Retrieve current developer and user tokens (for debugging/external use)"
        musickit_api: "MusicTokenProvider.shared"
        layer: framework
        availability: "macOS 13.0+"
        requires_auth: true
        arguments: []
        options:
          - name: "--type"
            short: "-t"
            type: string
            required: false
            default: "both"
            enum: [developer, user, both]
            description: "Which token(s) to retrieve"
        output_schema:
          type: object
          properties:
            developer_token: { type: string, nullable: true }
            user_token: { type: string, nullable: true }

  # ─── SEARCH ────────────────────────────────────────────────────────────────

  search:
    description: "Search the Apple Music catalog"
    musickit_api: "MusicCatalogSearchRequest"
    layer: framework
    availability: "macOS 12.0+"

    subcommands:

      songs:
        description: "Search catalog for songs"
        musickit_api: "MusicCatalogSearchRequest(term:, types: [Song.self])"
        requires_auth: true
        arguments:
          - name: query
            type: String
            required: true
            positional: true
            description: "Search term"
        options:
          - name: "--limit"
            short: "-l"
            type: Int
            required: false
            default: 10
            range: [1, 25]
            description: "Maximum number of results"
          - name: "--offset"
            short: "-o"
            type: Int
            required: false
            default: 0
            description: "Results offset for pagination"
        output_schema:
          data_type: "SongDTO[]"
          ref: "#/schemas/SongDTO"

      albums:
        description: "Search catalog for albums"
        musickit_api: "MusicCatalogSearchRequest(term:, types: [Album.self])"
        requires_auth: true
        arguments:
          - name: query
            type: String
            required: true
            positional: true
            description: "Search term"
        options:
          - name: "--limit"
            short: "-l"
            type: Int
            required: false
            default: 10
            range: [1, 25]
            description: "Maximum number of results"
          - name: "--offset"
            short: "-o"
            type: Int
            required: false
            default: 0
            description: "Results offset for pagination"
        output_schema:
          data_type: "AlbumDTO[]"
          ref: "#/schemas/AlbumDTO"

      artists:
        description: "Search catalog for artists"
        musickit_api: "MusicCatalogSearchRequest(term:, types: [Artist.self])"
        requires_auth: true
        arguments:
          - name: query
            type: String
            required: true
            positional: true
            description: "Search term"
        options:
          - name: "--limit"
            short: "-l"
            type: Int
            required: false
            default: 10
            range: [1, 25]
            description: "Maximum number of results"
          - name: "--offset"
            short: "-o"
            type: Int
            required: false
            default: 0
            description: "Results offset for pagination"
        output_schema:
          data_type: "ArtistDTO[]"
          ref: "#/schemas/ArtistDTO"

      playlists:
        description: "Search catalog for playlists"
        musickit_api: "MusicCatalogSearchRequest(term:, types: [Playlist.self])"
        requires_auth: true
        arguments:
          - name: query
            type: String
            required: true
            positional: true
            description: "Search term"
        options:
          - name: "--limit"
            short: "-l"
            type: Int
            required: false
            default: 10
            range: [1, 25]
            description: "Maximum number of results"
          - name: "--offset"
            short: "-o"
            type: Int
            required: false
            default: 0
            description: "Results offset for pagination"
        output_schema:
          data_type: "PlaylistDTO[]"
          ref: "#/schemas/PlaylistDTO"

      music-videos:
        description: "Search catalog for music videos"
        musickit_api: "MusicCatalogSearchRequest(term:, types: [MusicVideo.self])"
        requires_auth: true
        arguments:
          - name: query
            type: String
            required: true
            positional: true
            description: "Search term"
        options:
          - name: "--limit"
            short: "-l"
            type: Int
            required: false
            default: 10
            range: [1, 25]
            description: "Maximum number of results"
          - name: "--offset"
            short: "-o"
            type: Int
            required: false
            default: 0
            description: "Results offset for pagination"
        output_schema:
          data_type: "MusicVideoDTO[]"
          ref: "#/schemas/MusicVideoDTO"

      stations:
        description: "Search catalog for stations"
        musickit_api: "MusicCatalogSearchRequest(term:, types: [Station.self])"
        requires_auth: true
        arguments:
          - name: query
            type: String
            required: true
            positional: true
            description: "Search term"
        options:
          - name: "--limit"
            short: "-l"
            type: Int
            required: false
            default: 10
            range: [1, 25]
            description: "Maximum number of results"
          - name: "--offset"
            short: "-o"
            type: Int
            required: false
            default: 0
            description: "Results offset for pagination"
        output_schema:
          data_type: "StationDTO[]"
          ref: "#/schemas/StationDTO"

      curators:
        description: "Search catalog for curators"
        musickit_api: "MusicCatalogSearchRequest(term:, types: [Curator.self])"
        availability: "macOS 13.0+"
        requires_auth: true
        arguments:
          - name: query
            type: String
            required: true
            positional: true
            description: "Search term"
        options:
          - name: "--limit"
            short: "-l"
            type: Int
            required: false
            default: 10
            range: [1, 25]
            description: "Maximum number of results"
          - name: "--offset"
            short: "-o"
            type: Int
            required: false
            default: 0
            description: "Results offset for pagination"
        output_schema:
          data_type: "CuratorDTO[]"
          ref: "#/schemas/CuratorDTO"

      radio-shows:
        description: "Search catalog for radio shows"
        musickit_api: "MusicCatalogSearchRequest(term:, types: [RadioShow.self])"
        availability: "macOS 13.0+"
        requires_auth: true
        arguments:
          - name: query
            type: String
            required: true
            positional: true
            description: "Search term"
        options:
          - name: "--limit"
            short: "-l"
            type: Int
            required: false
            default: 10
            range: [1, 25]
            description: "Maximum number of results"
          - name: "--offset"
            short: "-o"
            type: Int
            required: false
            default: 0
            description: "Results offset for pagination"
        output_schema:
          data_type: "RadioShowDTO[]"
          ref: "#/schemas/RadioShowDTO"

      all:
        description: >
          Search catalog across multiple types simultaneously.
          Optionally includes top results ranked by relevance (macOS 13+).
        musickit_api: "MusicCatalogSearchRequest(term:, types: [...])"
        requires_auth: true
        arguments:
          - name: query
            type: String
            required: true
            positional: true
            description: "Search term"
        options:
          - name: "--types"
            short: "-t"
            type: "String (comma-separated)"
            required: false
            default: "songs,albums,artists,playlists"
            enum_values: [songs, albums, artists, playlists, music-videos, stations, curators, radio-shows]
            description: "Comma-separated list of resource types to search"
          - name: "--limit"
            short: "-l"
            type: Int
            required: false
            default: 10
            range: [1, 25]
            description: "Maximum number of results per type"
          - name: "--offset"
            short: "-o"
            type: Int
            required: false
            default: 0
            description: "Results offset for pagination"
          - name: "--top-results"
            short: null
            type: Bool
            required: false
            default: false
            availability: "macOS 13.0+"
            description: "Include top results ranked by relevance across all types"
        output_schema:
          type: object
          properties:
            songs: { type: "SongDTO[]", nullable: true }
            albums: { type: "AlbumDTO[]", nullable: true }
            artists: { type: "ArtistDTO[]", nullable: true }
            playlists: { type: "PlaylistDTO[]", nullable: true }
            music_videos: { type: "MusicVideoDTO[]", nullable: true }
            stations: { type: "StationDTO[]", nullable: true }
            curators: { type: "CuratorDTO[]", nullable: true }
            radio_shows: { type: "RadioShowDTO[]", nullable: true }
            top_results: { type: "TopResultDTO[]", nullable: true }

      suggestions:
        description: "Get search suggestions and autocomplete terms for a query"
        musickit_api: "MusicCatalogSearchSuggestionsRequest(term:, types: [...])"
        layer: framework
        availability: "macOS 13.0+"
        requires_auth: true
        arguments:
          - name: term
            type: String
            required: true
            positional: true
            description: "Partial search term for suggestions"
        options:
          - name: "--types"
            short: "-t"
            type: "String (comma-separated)"
            required: false
            default: "songs,albums,artists"
            description: "Resource types to include in suggestions"
        output_schema:
          type: object
          properties:
            suggestions:
              type: array
              items:
                type: object
                properties:
                  display_term: { type: string }
                  search_term: { type: string }
                  kind: { type: string, enum: [term, topResult] }
            top_results:
              type: array
              nullable: true
              items:
                type: object
                properties:
                  type: { type: string }
                  id: { type: string }
                  title: { type: string }

  # ─── CATALOG ───────────────────────────────────────────────────────────────

  catalog:
    description: "Fetch specific resources from the Apple Music catalog by ID"

    subcommands:

      song:
        description: "Fetch a specific song by catalog ID"
        musickit_api: "MusicCatalogResourceRequest<Song>(matching: \\.id, equalTo:)"
        layer: framework
        availability: "macOS 12.0+"
        requires_auth: true
        arguments:
          - name: id
            type: String
            required: true
            positional: true
            description: "Apple Music catalog song ID"
        options:
          - name: "--include"
            short: "-i"
            type: "String (comma-separated)"
            required: false
            default: null
            enum_values: [artists, albums, genres, station, music-videos, composer]
            description: "Relationships to eagerly load via .properties"
        output_schema:
          data_type: "SongDTO"
          ref: "#/schemas/SongDTO"

      song-by-isrc:
        description: "Fetch a song by ISRC (International Standard Recording Code)"
        musickit_api: "MusicCatalogResourceRequest<Song>(matching: \\.isrc, equalTo:)"
        layer: framework
        availability: "macOS 12.0+"
        requires_auth: true
        arguments:
          - name: isrc
            type: String
            required: true
            positional: true
            description: "ISRC code (e.g. USUM71703861)"
        options:
          - name: "--include"
            short: "-i"
            type: "String (comma-separated)"
            required: false
            default: null
            enum_values: [artists, albums, genres]
            description: "Relationships to eagerly load"
        output_schema:
          data_type: "SongDTO[]"
          ref: "#/schemas/SongDTO"
          note: "May return multiple songs matching the ISRC"

      album:
        description: "Fetch a specific album by catalog ID"
        musickit_api: "MusicCatalogResourceRequest<Album>(matching: \\.id, equalTo:)"
        layer: framework
        availability: "macOS 12.0+"
        requires_auth: true
        arguments:
          - name: id
            type: String
            required: true
            positional: true
            description: "Apple Music catalog album ID"
        options:
          - name: "--include"
            short: "-i"
            type: "String (comma-separated)"
            required: false
            default: null
            enum_values: [tracks, artists, genres, related-albums, record-labels]
            description: "Relationships to eagerly load"
          - name: "--with-audio-variants"
            short: null
            type: Bool
            required: false
            default: false
            availability: "macOS 13.0+"
            description: "Load audioVariants extended attribute (Spatial Audio, Lossless, etc.)"
        output_schema:
          data_type: "AlbumDTO"
          ref: "#/schemas/AlbumDTO"

      album-by-upc:
        description: "Fetch an album by UPC (Universal Product Code)"
        musickit_api: "MusicCatalogResourceRequest<Album>(matching: \\.upc, equalTo:)"
        layer: framework
        availability: "macOS 12.0+"
        requires_auth: true
        arguments:
          - name: upc
            type: String
            required: true
            positional: true
            description: "UPC barcode value"
        options:
          - name: "--include"
            short: "-i"
            type: "String (comma-separated)"
            required: false
            default: null
            enum_values: [tracks, artists, genres]
            description: "Relationships to eagerly load"
        output_schema:
          data_type: "AlbumDTO[]"
